# Модели для сравнительного исследования (задача: classification).
# weights — начальные веса (Ultralytics скачает автоматически при первом запуске).
models:
  - name: yolov8n-cls
    weights: yolov8n-cls.pt
  - name: yolov8s-cls
    weights: yolov8s-cls.pt
  - name: yolo11n-cls
    weights: yolo11n-cls.pt
  - name: yolo11s-cls
    weights: yolo11s-cls.pt

# Гиперпараметры — одинаковые для всех (честное сравнение)
train:
  epochs: 50
  imgsz: 224        # стандарт для cls (ImageNet-style)
  batch: 32
  patience: 15
  optimizer: AdamW
  lr0: 0.001
  seed: 42
